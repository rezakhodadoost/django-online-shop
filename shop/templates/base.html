{% load static %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <title>{% block title %}Shopping To Smile{% endblock %}</title>
        <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    </head>


    <body>
        <header>

            <div class="header">
                <a href="{% url 'cart' %}" class="logo">
                    <img src="{% static 'image/images.png' %}" alt="Shopping Logo">
                    <span>shopping</span>
                </a>
            {% if request.session.user_name %}

                <a href="{% url 'profile' %}" class="profile-link">

                    <span>{{ request.session.user_name }}</span>

                </a>

            {% endif %}
            <form class="header-search" action="{% url 'search_results' %}" method="get">
                <input 
                    type="text" 
                    name="q" 
                    placeholder="Search products..."
                >

                <button type="submit">
                    Search
                </button>
            </form>
                <div class="header-right">
                    <a class="active" href="{% url 'home' %}">Home</a>
                    <a href="{% url 'signup' %}">Signup</a>
                    <a href="#about">About</a>
                    <a href="{% url 'logout' %}">Logout</a>
                    <a href="{% url 'cart' %}">Cart</a>
                    <a href="{% url 'likes' %}">My Likes</a>
                </div>
            </div>
        </header>
        <h1>Products</h1>
        <main> 
            {% block content %}
            {% endblock %} 
        </main>
        <footer>
            
            <p><a href="mailto:example@gmail.com">example@gmail.com</a></p>
        </footer>
    </body>
    

</html>
